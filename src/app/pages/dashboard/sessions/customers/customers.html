<app-customer-header (addCustomer)="onAddCustomer()" />

<app-customer-status-chart />

<app-customer-searchbar (filtersChange)="onFiltersChange($event)" />

<app-customer-table [customers]="filteredCustomers" [totalCustomers]="originalCustomers.length" [hasActiveFilters]="hasActiveFilters" (viewDetails)="onSelectCustomer($event)" (editCustomer)="onEditCustomer($event)" (deleteCustomer)="onDeleteCustomer($event)" />

<app-customer-add-new-modal (customerAdded)="loadCustomers()" [customer]="customerToEdit" />

<app-customer-details-modal [customer]="selectedCustomer" />

<app-customer-cashbacks-modal [customer]="selectedCustomer" />

<app-customer-delete-modal [customer]="customerToDelete" (confirmDelete)="confirmDelete($event)" />
