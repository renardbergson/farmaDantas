<div class="dashboard-card">
  <div class="dashboard-card-header">
    <div>
      <h2 class="dashboard-card-title">Contagem de cashbacks</h2>
      <p class="dashboard-card-subtitle">Quantidade gerada por mês</p>
    </div>
  </div>
  <div class="dashboard-card-body">
    @if (hasData) {
      <div class="chart-container">
        <canvas id="cashbackBarChart"></canvas>
      </div>
    } @else {
      <div class="empty-state">
        <div class="empty-state-icon">
          <i class="bi bi-bar-chart"></i>
        </div>
        <h3 class="empty-state-title">Sem dados para exibir</h3>
        <p class="empty-state-text">
          Ainda não há histórico de cashbacks para montar o gráfico de contagem mensal.
        </p>
      </div>
    }
  </div>
</div>
