<div class="modal fade" id="modalNovaCompra" tabindex="-1" aria-labelledby="modalNovaCompraLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered purchases-modal-dialog">
    <div class="modal-content purchases-modal-content">
      <div class="modal-header-custom d-flex align-items-center justify-content-between">
        <div>
          <p class="modal-title-custom mb-0" id="modalNovaCompraLabel">Registrar Compra</p>
          <p class="modal-subtitle">Insira os dados da compra para gerar o cashback</p>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>

      <div class="modal-body-custom">
        <form #purchaseForm="ngForm">
          <!-- Cliente -->
          <div class="mb-3">
            <label class="form-label-custom d-block">Cliente</label>
            <ng-select [(ngModel)]="customer" name="client" placeholder="Selecione ou busque o cliente" class="custom-ng-select w-100" [items]="customers" bindLabel="name" [searchable]="true" [clearable]="true" required>
            </ng-select>
          </div>

          <!-- Data -->
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label-custom d-block">Data</label>
              <input type="date" class="form-control form-control-custom" [(ngModel)]="purchaseDateStr" name="purchaseDate" required>
            </div>

            <!-- Funcionário -->
            <div class="col-6">
              <label class="form-label-custom d-block">Funcionário</label>
              <ng-select [(ngModel)]="employee" name="employee" placeholder="Selecione ou busque o funcionário" class="custom-ng-select w-100" [items]="employees" bindLabel="name" [searchable]="true" [clearable]="true" required>
              </ng-select>
            </div>
          </div>

          <!-- Valor -->
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label-custom d-block">Valor da Compra</label>
              <input type="text" inputmode="decimal" [currencyMask]="{prefix: 'R$ ', thousands: '.', decimal: ','}" class="form-control form-control-custom" [(ngModel)]="total" name="purchaseValue" required>
            </div>

            <!-- Categoria -->
            <div class="col-6">
              <label class="form-label-custom d-block">Categoria</label>
              <select class="form-select form-select-custom" required>
                <option value="" disabled selected>Categoria</option>
                @for(category of categories; track $index) {
                <option value="{{ category }}">{{ category }}</option>
                }
              </select>
            </div>
          </div>

          <!-- Percentual de cashback (slider) -->
          <div class="mb-3">
            <label class="form-label-custom d-block">
              Percentual de cashback: <span class="cashback-percent-value">{{ cashbackPercent }}%</span>
            </label>
            <input type="range" class="form-range cashback-slider" min="0" max="100" step="1" [(ngModel)]="cashbackPercent" name="cashbackPercent">
          </div>

          <!-- Preview Cashback -->
          <div class="cashback-preview mb-1">
            <div class="d-flex justify-content-between align-items-center">
              <span class="cashback-preview-label">Cashback ({{ cashbackPercent }}%)</span>
              <span class="cashback-preview-value">{{ cashbackValueFormatted }}</span>
            </div>
            <p class="cashback-preview-hint mb-0">O cashback será válido por 30 dias</p>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn-primary-gradient">
          <i class="bi bi-cart-plus"></i>
          Registrar Compra
        </button>
      </div>
    </div>
  </div>
</div>
