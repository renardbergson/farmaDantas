<div class="dashboard-card mb-4">
  <div class="dashboard-card-body p-3">
    <div class="d-flex flex-wrap align-items-center gap-4">
      <!-- Campo de Busca -->
      <div class="search-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input
          type="text"
          class="form-control search-input"
          placeholder="Buscar por cliente ou categoria..."
        >
      </div>

      <!-- Filtros de Categoria -->
      <div class="status-filters d-flex align-items-center gap-3">
        <span class="filter-label text-muted"><i class="bi bi-funnel me-1"></i> Filtrar:</span>
        <div class="d-flex gap-2">
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-antibiotic" class="btn-check">
            <label for="filter-antibiotic" class="status-chip filter-antibiotic">
              Antibiótico
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-contraceptive" class="btn-check">
            <label for="filter-contraceptive" class="status-chip filter-contraceptive">
              Anticoncepcional
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-continuous" class="btn-check">
            <label for="filter-continuous" class="status-chip filter-continuous">
              Contínuo
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-controlled" class="btn-check">
            <label for="filter-controlled" class="status-chip filter-controlled">
              Controlado
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-kids" class="btn-check">
            <label for="filter-kids" class="status-chip filter-kids">
              Infantil
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-supplements" class="btn-check">
            <label for="filter-supplements" class="status-chip filter-supplements">
              Suplementos
            </label>
          </div>
          <div class="filter-checkbox">
            <input type="checkbox" id="filter-elderly" class="btn-check">
            <label for="filter-elderly" class="status-chip filter-elderly">
              Idoso
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
