<section class="purchases-page animate-fade-in">
  <app-purchases-header />
  <app-purchases-stats-cards />
  <app-purchases-searchbar (filtersChange)="onFiltersChange($event)" />
  <app-purchases-table 
    [purchases]="filteredPurchases" 
    [isLoading]="isLoading"
    [totalPurchases]="originalPurchases.length"
    [hasActiveFilters]="hasActiveFilters"
    (viewDetails)="onViewPurchaseDetails($event)" 
    (deletePurchase)="onDeletePurchase($event)" 
  />
</section>

<app-purchase-add-new-modal (purchaseAdded)="onPurchaseAdded()" />
<app-purchase-details-modal [purchaseId]="selectedPurchaseId" />
<app-purchase-delete-modal 
  [purchase]="purchaseToDelete" 
  (confirmDelete)="confirmDelete($event)" 
/>
